services:
  - type: web
    name: yalova-sanat-bilet-sistemi
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 23.9.0
      - key: STORAGE_ROOT
        value: /opt/render/project/src/storage
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD_SALT
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    disk:
      name: yalova-sanat-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
